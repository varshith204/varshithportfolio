<!DOCTYPE html>
<html lang="en">
    <head>
       <meta charset="UTF-8">
         <title>Learn Geetha Online</title>
         <style>
            body{
                font-family: Arial, Helvetica, sans-serif ;
                background:honeydew ;
                margin:0;
                padding:20px;
            }
            h1{
                text-align:center ;
                color:#333;
            }
            section{
                background: white;
                padding:15px;
                margin:20px auto;
                max-width:700px;
                border-radius: 8px;
                box-shadow: 0 0 10px #ccc ;

            }
            figure{
                text-align: center;
            }
            figcaption{
                font-style: italic;
                color:#555
            }
         </style>
    </head>
    <body>
        <h1>Learn Geetha Online</h1>
        <!--Image Section-->
        <section>
            <h2>Sri Krishna</h2>
            <figure>
                <img src="kri.jpeg" alt="Sri Krishna" width="500">
                <figcaption>Sri Krishna</figcaption>
            </figure>
        </section>
        <!--Audio Section-->
        <section>
            <h2>Audio Media</h2>
            <audio controls src="" type="audio/mpeg">
               Your brouser does not support audio
            </audio>
        </section>
         <!--Video Section-->
         <section>
            <h2>Video Media</h2>
            <video controls width="400" poster="thumbnail4.jpeg" src="krish.mp4" type="video/mp4"></video>
         </section>
         <!--PDF using Embed-->
         <section>
            <h2>Embedded PDF(Embed Tag)</h2>
            <embed src="sample.pdf" type="application/pdf" width="100%" height="300">
         </section>
         <!--PDF using Object-->
         <section>
             <h2>Embedded PDF(Object Tag)</h2>
             <object data="sample.pdf" type="application/pdf" width="100%" height="300">
              PDF cannot be displayed</object>
            </section>
            <!--Youtube Video-->
            <section>
                <iframe width="560" height="315" src="https://www.youtube.com/embed/LusTv0RlnSU?si=NuGeQmZ3OX64mlQx" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </section>
    </body>
</html>
